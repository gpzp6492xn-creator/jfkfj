<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل الذكية</title>
    <style>
        :root { --gold: #c5a059; --bg: #0b0e14; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid var(--gold); }
        .btn-order { background: var(--gold); color: black; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 20px; margin: 10px 0; border-radius: 15px; text-align: center; cursor: pointer; }
        .page { display: none; } .active { display: block; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>أهلاً: كريم</div>
        <div class="btn-order" onclick="show('orders')">📦 طلباتي</div>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="card" style="border-color: #4CAF50" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="card" style="border-color: #f44336" onclick="window.location.href='https://wa.me/201274847794'">⚠️ تقييم سلبي</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-content"></div>
        <div class="card" style="background:var(--gold); color:black" onclick="confirmOrder()">تأكيد الطلب | الإجمالي: <span id="total">0</span> ج.م</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="card" onclick="notify('كهرباء')">💡 كهرباء</div>
        <div class="card" onclick="notify('تكييف')">❄️ تكييف</div>
        <div class="card" onclick="notify('سباكة')">🚰 سباكة</div>
        <div class="card" onclick="notify('غاز')">🔥 غاز</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="card" onclick="notify('تنظيف غرفة - عادي')">🧹 تنظيف عادي</div>
        <div class="card" onclick="notify('تنظيف غرفة - مستعجل')">🚨 تنظيف مستعجل</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="orders" class="page">
        <h3>سجل الطلبات</h3>
        <div id="order-log">لا توجد طلبات</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        // مصفوفة الأصناف كاملة (تقدر تزود لـ 60 براحتك)
        const menu = [
            {n: "ساندوتش شاورما دجاج", p: 75}, {n: "وجبة شاورما عربي", p: 130}, {n: "بيتزا مارجريتا", p: 120},
            {n: "كفتة مشوية", p: 180}, {n: "كباب ضاني", p: 250}, {n: "ريش ضاني", p: 280}
        ];
        
        let cart = {};
        let list = document.getElementById('menu-content');
        
        menu.forEach(i => {
            list.innerHTML += `<div class="menu-item">${i.n} (${i.p}ج) 
                <button onclick="update('${i.n}',${i.p},1)">+</button>
                <span id="q-${i.n}">0</span>
                <button onclick="update('${i.n}',${i.p},-1)">-</button></div>`;
        });

        function update(n, p, d) {
            cart[n] = Math.max(0, (cart[n] || 0) + d);
            document.getElementById('q-'+n).innerText = cart[n];
            let tot = 0; menu.forEach(i => tot += (cart[i.n] || 0) * i.p);
            document.getElementById('total').innerText = tot;
        }

        function notify(type) {
            document.getElementById('order-log').innerHTML += `<div class="card">${type} <small>(قيد الانتظار)</small></div>`;
            alert("تم إرسال طلب " + type); show('main');
        }

        function confirmOrder() {
            let tot = document.getElementById('total').innerText;
            if(tot == "0") return alert("المنيو فاضي!");
            alert("تم تأكيد الطلب بقيمة " + tot + " ج.م"); show('main');
        }

        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
