<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النزيل - فندق 7 نجوم</title>
    <style>
        :root { --gold: #c5a059; --bg: #05070A; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 25px; }
        
        /* أزرار عملاقة للتحكم السهل */
        .btn-big { background: #1a1a2e; border: 4px solid var(--gold); padding: 50px 20px; margin: 25px 0; border-radius: 25px; text-align: center; font-size: 2.2rem; cursor: pointer; color: white; display: block; }
        .page { display: none; } .active { display: block; }
        
        /* تصميم المنيو والخيارات */
        .option-item { background: #1a1a2e; border: 2px solid var(--gold); padding: 40px; margin: 20px 0; border-radius: 15px; font-size: 1.8rem; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 30px; border: 2px solid var(--gold); text-align: center; font-size: 1.6rem; }
    </style>
</head>
<body>

    <div style="text-align:center; padding: 30px; border-bottom: 4px solid var(--gold);">
        <h1>أهلاً كريم - غرفة 15</h1>
    </div>

    <div id="main" class="page active">
        <div class="btn-big" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="btn-big" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="btn-big" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="btn-big" style="border-color: #4CAF50" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="btn-big" style="border-color: #f44336" onclick="window.location.href='https://wa.me/201274847794'">⚠️ تقييم سلبي</div>
        <div class="btn-big" style="background:var(--gold); color:black" onclick="show('orders')">📦 طلباتي</div>
    </div>

    <div id="restaurant" class="page">
        <div class="option-item">بيتزا مارجريتا (120ج) <button onclick="alert('تمت الإضافة')">+</button></div>
        <div class="option-item">شاورما دجاج (85ج) <button onclick="alert('تمت الإضافة')">+</button></div>
        <div class="btn-big" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="option-item" onclick="alert('تم طلب صيانة كهرباء')">💡 كهرباء</div>
        <div class="option-item" onclick="alert('تم طلب صيانة تكييف')">❄️ تكييف</div>
        <div class="btn-big" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="option-item" onclick="alert('تم طلب تنظيف عادي')">🧹 تنظيف عادي</div>
        <div class="option-item" onclick="alert('تم طلب تنظيف مستعجل')">🚨 مستعجل</div>
        <div class="btn-big" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="orders" class="page">
        <table><thead><tr><th>الطلب</th><th>الحالة</th></tr></thead><tbody id="order-list"></tbody></table>
        <div class="btn-big" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
