<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <h1>بوابة الخدمات</h1>
    <button onclick="sendOrder('بيتزا')">طلب بيتزا</button>
    <button onclick="sendOrder('صيانة')">طلب صيانة</button>

    <script>
        // مفتاح الربط الخاص بك
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('hotel-channel');

        function sendOrder(service) {
            channel.publish('new-order', {
                name: "كريم",
                room: "100",
                service: service,
                time: new Date().toLocaleTimeString()
            });
            alert("تم إرسال طلبك للمشرف!");
        }
    </script>
</body>
</html>
