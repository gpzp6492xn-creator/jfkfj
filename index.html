<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النزيل - فندق 5 نجوم</title>
    <style>
        :root { --gold: #c5a059; --bg: #0b0e14; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .orders-btn { background: var(--gold); color: #000; padding: 15px 25px; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        
        /* البطاقات العملاقة */
        .card { background: rgba(255,255,255,0.05); border: 2px solid #333; padding: 40px; margin: 20px 0; border-radius: 25px; text-align: center; font-size: 2rem; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: scale(1.02); }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 25px; border-bottom: 1px solid #222; font-size: 1.6rem; }
        .btn-qty { padding: 15px 30px; background: var(--gold); border: none; border-radius: 10px; font-size: 1.5rem; cursor: pointer; }
        
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 1.5rem;">أهلاً بك: <b>كريم محمد السيد</b></div>
        <div class="orders-btn" onclick="show('orders')">📦 طلباتي</div>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="card" onclick="show('maintenance')">🛠️ قسم الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 خدمة التنظيف</div>
        <div class="card" style="border-color: #4CAF50" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="card" style="border-color: #f44336" onclick="window.location.href='https://wa.me/201274847794'">⚠️ تقييم سلبي</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-list"></div>
        <div class="card" style="background:var(--gold); color:#000" onclick="alert('تم إرسال الطلب بنجاح!')">تأكيد الطلب | الإجمالي: <span id="total">0</span> ج.م</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="card" onclick="notify('كهرباء')">💡 كهرباء</div>
        <div class="card" onclick="notify('تكييف')">❄️ تكييف</div>
        <div class="card" onclick="notify('سباكة')">🚰 سباكة</div>
        <div class="card" onclick="notify('غاز')">🔥 غاز</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="card" onclick="notify('تنظيف غرفة - عادي')">🧹 تنظيف عادي</div>
        <div class="card" onclick="notify('تنظيف غرفة - مستعجل')">🚨 تنظيف مستعجل</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="orders" class="page">
        <h3>سجل طلباتك</h3>
        <div id="order-log" style="font-size: 1.5rem;">لا توجد طلبات</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        // الأصناف من المنيو
        const menu = [
            {n: "ساندوتش شاورما دجاج", p: 75}, {n: "شاورما سوري وسط", p: 85}, {n: "وجبة شاورما عربي", p: 130},
            {n: "بيتزا مارجريتا", p: 120}, {n: "كفتة مشوية", p: 180}, {n: "كباب ضاني", p: 250},
            {n: "ريش ضاني", p: 280}, {n: "طاجن ملوخية", p: 50}, {n: "بطاطس محمرة", p: 40}
        ];
        
        let cart = {};
        let list = document.getElementById('menu-list');
        
        menu.forEach(i => {
            list.innerHTML += `<div class="menu-item">${i.n} (${i.p}ج) 
                <div>
                    <button class="btn-qty" onclick="update('${i.n}',${i.p},1)">+</button>
                    <span id="q-${i.n}" style="margin:0 20px">0</span>
                    <button class="btn-qty" onclick="update('${i.n}',${i.p},-1)">-</button>
                </div></div>`;
        });

        function update(n, p, d) {
            cart[n] = Math.max(0, (cart[n] || 0) + d);
            document.getElementById('q-'+n).innerText = cart[n];
            let tot = 0; menu.forEach(i => tot += (cart[i.n] || 0) * i.p);
            document.getElementById('total').innerText = tot;
        }

        function notify(type) {
            document.getElementById('order-log').innerHTML += `<div class="card">${type} <br><small style="color:var(--gold)">قيد الانتظار</small></div>`;
            alert("تم إرسال طلب " + type + " بنجاح!"); show('main');
        }

        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
