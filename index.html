<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل | فندق 5 نجوم</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 15px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .orders-btn { background: var(--gold); padding: 8px 15px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 20px; margin: 10px 0; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        
        .page { display: none; } .active { display: block; }
        .status-tag { font-size: 0.8rem; color: var(--gold); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>أهلاً يا: <span id="u-name">...</span></div>
        <div class="orders-btn" onclick="show('orders')">📦 طلباتي</div>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="card" style="border-color: #4CAF50" onclick="window.location.href='https://maps.google.com'">😊 تقييم إيجابي</div>
        <div class="card" style="border-color: #f44336" onclick="rateNeg()">😞 تقييم سلبي</div>
    </div>

    <div id="orders" class="page">
        <h3>سجل طلباتك</h3>
        <div id="order-log">لا توجد طلبات حالياً</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="card" onclick="send('الصيانة', 'كهرباء')">💡 كهرباء</div>
        <div class="card" onclick="send('الصيانة', 'تكييف')">❄️ تكييف</div>
        <div class="card" onclick="send('الصيانة', 'سباكة')">🚰 سباكة</div>
        <div class="card" onclick="send('الصيانة', 'غاز')">🔥 غاز</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="card" onclick="send('التنظيف', 'غرفة - عادي')">🧹 تنظيف عادي</div>
        <div class="card" onclick="send('التنظيف', 'غرفة - مستعجل')">🚨 تنظيف مستعجل</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        let guest = JSON.parse(localStorage.getItem('guest_data'));
        document.getElementById('u-name').innerText = guest ? guest.n : "النزيل";

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function send(sec, type) {
            let log = document.getElementById('order-log');
            if(log.innerText == "لا توجد طلبات حالياً") log.innerHTML = "";
            log.innerHTML += `<div class="card">${type} <br> <span class="status-tag">حالة الطلب: قيد الانتظار</span></div>`;
            alert("تم إرسال طلب " + type + " للفريق!");
            show('main');
        }

        function rateNeg() {
            window.location.href = `https://wa.me/201274847794?text=أنا النزيل ${guest.n}، غرفة ${guest.r}، عندي مشكلة.`;
        }
    </script>
</body>
</html>
