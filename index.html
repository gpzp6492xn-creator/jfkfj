<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم الطيب - تجربة فضائية</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* خلفية الفضاء المتحركة */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        /* إضافة تأثير النجوم المتلألئة */
        .stars {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            box-shadow: 0 0 10px white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .logo-container {
            position: relative;
            margin-bottom: 40px;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .logo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.6), inset 0 0 20px rgba(241, 196, 15, 0.4);
            object-fit: cover;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px #f1c40f;
            margin: 0 0 10px 0;
            font-size: 26px;
        }

        p { color: #8892b0; margin-bottom: 30px; }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 20px 0;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-positive {
            background: linear-gradient(45deg, #00b09b, #96c93d);
            color: white;
            box-shadow: 0 0 20px rgba(0, 176, 155, 0.5);
        }

        .btn-negative {
            background: transparent;
            border: 2px solid #e74c3c;
            color: #e74c3c;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .cosmic-footer {
            margin-top: 20px;
            color: #444;
            font-size: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="space-bg"></div>

<div class="container">
    <div class="logo-container">
        <img src="https://via.placeholder.com/150?text=الطيب" alt="الطيب" class="logo">
    </div>

    <div class="glass-panel">
        <h1>مطعم الطيب</h1>
        <p>رحلة مذاق من كوكب آخر</p>
        
        <a href="https://search.google.com/local/writereview?placeid=ChIJq-FYuPQ5WBQRaAhFrbMTaLI" target="_blank" class="btn btn-positive">⭐ تقييم 5 نجوم (خرافي)</a>

        <a href="https://wa.me/201016944198?text=عندي%20تعليق%20سلبي%20لمكان%20حضرتك%20:%20" target="_blank" class="btn btn-negative">🚀 إرسال ملاحظات للإدارة</a>
        
        <div class="cosmic-footer">SYSTEM v3.0 | DEEP SPACE DIVS</div>
    </div>
</div>

<script>
    // توليد نجوم عشوائية في الخلفية
    const space = document.querySelector('.space-bg');
    for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'stars';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 2 + 's';
        space.appendChild(star);
    }
</script>

</body>
</html>
