<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فندق 5 نجوم - خدمات النزلاء</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--white); margin: 0; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid var(--gold); background: transparent; color: white; box-sizing: border-box; }
        .category { background: var(--gold); color: black; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .category:hover { transform: scale(1.02); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="profile-section" class="glass">
        <h3>بيانات الإقامة</h3>
        <input type="text" id="name" placeholder="الاسم الثلاثي">
        <input type="text" id="room" placeholder="رقم الغرفة">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <button class="category" style="width:100%" onclick="saveProfile()">حفظ البيانات</button>
    </div>

    <div id="services-section" class="hidden">
        <div class="category" onclick="openMenu('restaurant')">قسم المطعم (قائمة الطعام)</div>
        <div class="category" onclick="openMenu('maintenance')">قسم الصيانة (سباكة/كهرباء/تكييف)</div>
        <div class="category" onclick="openMenu('housekeeping')">قسم التنظيف</div>
        <div class="category" onclick="openRating()">قيم المكان</div>
    </div>

    <div id="rating-section" class="hidden glass">
        <h3>كيف كانت تجربتك؟</h3>
        <button class="category" onclick="handleRating('positive')">إيجابي 😊</button>
        <button class="category" style="background:#dc3545;" onclick="handleRating('negative')">سلبي 😞</button>
    </div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('hotel-service');

        window.onload = () => {
            if(localStorage.getItem('name')) {
                document.getElementById('profile-section').classList.add('hidden');
                document.getElementById('services-section').classList.remove('hidden');
            }
        };

        function saveProfile() {
            localStorage.setItem('name', document.getElementById('name').value);
            localStorage.setItem('room', document.getElementById('room').value);
            localStorage.setItem('phone', document.getElementById('phone').value);
            location.reload();
        }

        function handleRating(type) {
            if(type === 'positive') { alert("شكراً لتقييمك الرائع!"); }
            else {
                const msg = `شكوى من ${localStorage.getItem('name')}، غرفة ${localStorage.getItem('room')}. تفاصيل الشكوى:`;
                window.open(`https://wa.me/201000000000?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }

        // ملاحظة: لطلب 30 صنف، يمكنك عمل مصفوفة (Array) داخل دالة openMenu('restaurant') 
        // لعرض قائمة طويلة باستخدام الـ DOM
    </script>
</body>
</html>
