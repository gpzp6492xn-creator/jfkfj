<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Concierge | 7-Star</title>
    <style>
        /* CSS الفاخر - نمط الـ Glassmorphism */
        body { background: #0a0a0a; color: #d4af37; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #d4af37; color: white; border-radius: 8px; }
        button { background: #d4af37; color: #000; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="login-screen">
        <h2>مرحباً بك في فندقنا</h2>
        <input type="text" id="userName" placeholder="الاسم الثلاثي">
        <input type="text" id="roomNum" placeholder="رقم الغرفة">
        <button onclick="login()">دخول</button>
    </div>

    <div class="card hidden" id="main-screen">
        <h2 id="welcomeMsg"></h2>
        <button onclick="requestService('تنظيف')">طلب تنظيف الغرفة</button>
        <button onclick="requestService('صيانة')">طلب صيانة</button>
        <button onclick="logout()">خروج</button>
    </div>

    <script>
        // منطق الـ JavaScript
        function login() {
            const name = document.getElementById('userName').value;
            const room = document.getElementById('roomNum').value;
            if(name && room) {
                localStorage.setItem('guest', JSON.stringify({name, room}));
                showDashboard();
            }
        }

        function showDashboard() {
            const guest = JSON.parse(localStorage.getItem('guest'));
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `أهلاً بك يا ${guest.name}`;
        }

        function requestService(type) {
            alert(`تم إرسال طلب ${type} بنجاح! سيصلك الفريق فوراً.`);
        }

        function logout() {
            localStorage.removeItem('guest');
            location.reload();
        }

        // فحص تلقائي عند فتح الصفحة
        window.onload = () => {
            if(localStorage.getItem('guest')) showDashboard();
        };
    </script>
</body>
</html>
