<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة النزيل - فندق 7 نجوم</title>
    <style>
        :root { --gold: #c5a059; --bg: #05070A; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid var(--gold); }
        .orders-btn { background: var(--gold); color: #000; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .card { background: #1a1a2e; border: 1px solid var(--gold); padding: 30px; margin: 15px 0; border-radius: 15px; text-align: center; font-size: 1.5rem; cursor: pointer; }
        .page { display: none; } .active { display: block; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        .btn-qty { padding: 10px 20px; background: var(--gold); border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>أهلاً: <span id="u-name">كريم محمد السيد</span></div>
        <div class="orders-btn" onclick="show('orders')">📦 طلباتي</div>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة (كهرباء، غاز، تكييف، سباكة)</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف (عادي، مستعجل)</div>
        <div class="card" style="border-color: #4CAF50" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="card" style="border-color: #f44336" onclick="rateNeg()">⚠️ تقييم سلبي (إبلاغ الإدارة)</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-list"></div>
        <div class="card" style="background:var(--gold); color:#000" onclick="confirmOrder()">تأكيد الطلب | الإجمالي: <span id="total">0</span> ج.م</div>
        <button onclick="show('main')">🔙 عودة</button>
    </div>

    <div id="orders" class="page">
        <h3>📦 قيد الانتظار</h3><div id="pending"></div>
        <h3>⚙️ قيد التنفيذ</h3><div id="processing"></div>
        <h3>✅ تم التنفيذ</h3><div id="done"></div>
        <button onclick="show('main')">🔙 عودة</button>
    </div>

    <script>
        const menu = [
            {n: "بيتزا مارجريتا", p: 120}, {n: "وجبة شاورما عربي", p: 130}, {n: "مشويات ميكس", p: 350},
            {n: "ساندوتش دجاج", p: 75}, {n: "باستا", p: 140}, {n: "عصير فريش", p: 40},
            {n: "سلطة يونانية", p: 60}, {n: "ريش ضاني", p: 280}, {n: "كفتة", p: 180}
            // ضفت مجموعة، يمكنك تكرار السطر لإضافة حتى 100 صنف
        ];

        let cart = {};
        menu.forEach(i => {
            document.getElementById('menu-list').innerHTML += `<div class="menu-item">${i.n} 
                <div><button class="btn-qty" onclick="update('${i.n}',${i.p},1)">+</button> <span id="q-${i.n}">0</span> <button class="btn-qty" onclick="update('${i.n}',${i.p},-1)">-</button></div></div>`;
        });

        function update(n, p, d) {
            cart[n] = Math.max(0, (cart[n] || 0) + d);
            document.getElementById('q-'+n).innerText = cart[n];
            let tot = 0; menu.forEach(i => tot += (cart[i.n] || 0) * i.p);
            document.getElementById('total').innerText = tot;
        }

        function confirmOrder() {
            document.getElementById('pending').innerHTML += `<div class="card">طلب طعام - الإجمالي: ${document.getElementById('total').innerText}</div>`;
            alert("تم إرسال الطلب!"); show('main');
        }

        function rateNeg() {
            const msg = encodeURIComponent("أنا النزيل كريم محمد السيد، الغرفة 15، عندي مشكلة بخصوص مكان الإقامة وأحتاج مساعدة الإدارة.");
            window.location.href = "https://wa.me/201274847794?text=" + msg;
        }

        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
