<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الخدمات الذكية - الفندق الفاخر</title>
    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-space: #070714;
            --card-space: rgba(15, 15, 35, 0.75);
            --neon-blue: #00f0ff;
            --neon-purple: #bd00ff;
            --neon-pink: #ff007a;
            --neon-green: #00ffa3;
            --neon-yellow: #ffb700;
            --text-main: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #120e2e 0%, var(--bg-space) 100%);
            color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 500px; margin: 60px auto 30px auto; position: relative; }
        
        /* 🔔 زر "طلباتي" الفاخر أعلى اليمين */
        .my-orders-btn {
            position: fixed; top: 15px; right: 15px; background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--neon-blue); padding: 10px 16px; border-radius: 50px;
            color: var(--neon-blue); font-weight: bold; cursor: pointer; z-index: 1000;
            display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);
            transition: 0.3s; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }
        .my-orders-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        /* 📋 اللوحة الجانبية المتحركة للطلبات */
        .orders-drawer {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100%;
            background: rgba(10, 10, 25, 0.95); backdrop-filter: blur(20px); z-index: 1001;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
            padding: 25px; box-sizing: border-box; border-left: 1px solid rgba(0, 240, 255, 0.15);
        }
        .orders-drawer.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        .close-drawer { background: none; border: none; color: var(--neon-pink); font-size: 24px; cursor: pointer; }

        /* 🏷️ تقسيم حالات الطلبات داخل اللوحة */
        .status-section { margin-bottom: 25px; }
        .status-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-waiting { color: var(--neon-yellow); }
        .status-progress { color: var(--neon-blue); }
        .status-done { color: var(--neon-green); }
        
        .drawer-order-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 8px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.01);
        }

        /* التصميم العام اللوحات للنزيل */
        .glass-panel {
            background: var(--card-space); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.15); border-radius: 28px; padding: 30px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
        }
        h2 { text-align: center; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: var(--neon-blue); margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 14px 18px; background: rgba(5, 5, 15, 0.8); border: 1px solid rgba(0, 240, 255, 0.25); border-radius: 14px; color: white; box-sizing: border-box; outline: none; }
        .btn-neon { width: 100%; background: linear-gradient(135deg, #00b4d8, var(--neon-purple)); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 12px; transition: 0.3s; }
        .btn-neon:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0, 240, 255, 0.5); }
        .section-btn { background: rgba(255, 255, 255, 0.05); margin-bottom: 16px; justify-content: space-between; border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none !important; }
        .item-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 18px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .counter-box { display: flex; align-items: center; gap: 15px; background: rgba(0, 0, 0, 0.5); padding: 6px 12px; border-radius: 10px; }
        .btn-count { background: none; border: none; color: var(--neon-blue); font-size: 22px; cursor: pointer; }
        .cart-bar { background: linear-gradient(135deg, #03001e, #7303c0); border-top: 2px solid var(--neon-blue); position: fixed; bottom: 0; left: 0; width: 100%; padding: 18px 24px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; border-radius: 24px 24px 0 0; z-index: 999; }
        .rating-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <button id="my-orders-trigger" class="my-orders-btn hidden" onclick="toggleDrawer(true)">
        <i class="fa-solid fa-clock-history"></i> طلباتي 
    </button>

    <div id="orders-drawer" class="orders-drawer">
        <div class="drawer-header">
            <h3 style="margin:0; color: var(--neon-blue);"><i class="fa-solid fa-bell"></i> تتبع طلباتك</h3>
            <button class="close-drawer" onclick="toggleDrawer(false)"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="status-section">
            <div class="status-title status-waiting"><i class="fa-solid fa-hourglass-half"></i> قيد الانتظار (في المراجعة)</div>
            <div id="list-waiting">
                <p style="color:#64748b; font-size:12px; margin:5px 0;">لا توجد طلبات معلقة</p>
            </div>
        </div>

        <div class="status-section">
            <div class="status-title status-progress"><i class="fa-solid fa-spinner fa-spin"></i> جاري تنفيذها الآن</div>
            <div id="list-progress">
                <p style="color:#64748b; font-size:12px; margin:5px 0;">لا توجد طلبات قيد التنفيذ حالياً</p>
            </div>
        </div>

        <div class="status-section">
            <div class="status-title status-done"><i class="fa-solid fa-circle-check"></i> تم تنفيذها بنجاح</div>
            <div id="list-done">
                <p style="color:#64748b; font-size:12px; margin:5px 0;">لم يتم إنهاء أي طلب بعد</p>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="setup-step" class="glass-panel">
            <h2><i class="fa-solid fa-bolt"></i> بوابة النزلاء الذكية</h2>
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> الاسم رباعي:</label>
                <input type="text" id="guest-name" placeholder="محمد أحمد محمود">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-door-open"></i> رقم الغرفة:</label>
                <input type="number" id="guest-room" placeholder="204">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-phone"></i> رقم الهاتف:</label>
                <input type="tel" id="guest-phone" placeholder="01012345678">
            </div>
            <button class="btn-neon" onclick="saveProfile()">اتصال بالمركبة الفندقية 🚀</button>
        </div>

        <div id="app-step" class="glass-panel hidden">
            <h2 id="welcome-msg">بوابة النزيل الفاخر</h2>
            <div id="menu-home">
                <button class="btn-neon section-btn" onclick="openSection('restaurant-view')"><span>🍔 اطلب من المطعم</span> <i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn-neon section-btn" onclick="openSection('maintenance-view')"><span>🔧 طلب صيانة للغرفة</span> <i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn-neon section-btn" onclick="openSection('cleaning-view')"><span>🧹 خدمة تنظيف الغرف</span> <i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn-neon section-btn" onclick="toggleRatingMenu()"><span>⭐ قيم المكان</span> <i class="fa-solid fa-star"></i></button>
                
                <div id="rating-submenu" class="rating-box hidden">
                    <button class="btn-neon" style="background:#00b4d8;" onclick="window.open('https://search.google.com/local/writereview?placeid=ChIJawk683AvVhQRWPXoXaiXeCw', '_blank')">تقييم إيجابي</button>
                    <button class="btn-neon" style="background:var(--neon-pink);" onclick="sendComplaint()">تقييم سلبي</button>
                </div>
            </div>

            <div id="restaurant-view" class="hidden">
                <div id="food-list"></div>
                <button class="btn-neon" style="background:#334155; margin-top:20px;" onclick="goHome()">🔙 عودة</button>
            </div>

            <div id="maintenance-view" class="hidden">
                <label>نوع العطل الفني:</label>
                <select id="maint-type">
                    <option value="كهرباء">⚡ أعطال الكهرباء والتكييف</option>
                    <option value="سباكة">🚰 أعطال السباكة والمياه</option>
                </select>
                <button class="btn-neon" style="margin-top:25px;" onclick="addNewRequest('maintenance')">إرسال طلب صيانة 🛠️</button>
                <button class="btn-neon" style="background:#334155; margin-top:10px;" onclick="goHome()">إلغاء</button>
            </div>

            <div id="cleaning-view" class="hidden">
                <p style="text-align: center; color: #94a3b8;">سيتحرك طاقم التنظيف لتعقيم وترتيب غرفتك فوراً.</p>
                <button class="btn-neon" style="background:#10b981;" onclick="addNewRequest('cleaning')">🚀 تأكيد طلب النظافة</button>
                <button class="btn-neon" style="background:#334155; margin-top:10px;" onclick="goHome()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="cart-floating-bar" class="cart-bar hidden">
        <div><span id="cart-total-price" style="font-size:22px; font-weight:bold; color:#ffca28;">0 EGP</span></div>
        <button onclick="addNewRequest('restaurant')" class="btn-neon" style="width:auto;">تأكيد الطلب للمطبخ 👨‍🍳</button>
    </div>

    <script>
        const FOOD_MENU = [
            { id: 1, name: "الوجبة الإقتصادية", price: 120 },
            { id: 2, name: "وجبة إلدو خور", price: 140 },
            { id: 3, name: "وجبة الجوكر", price: 145 },
            { id: 4, name: "فرخة مشوية كاملة", price: 310 }
        ];
        let cart = {};

        window.onload = function() {
            if(localStorage.getItem('guest_name')) {
                document.getElementById('setup-step').classList.add('hidden');
                document.getElementById('app-step').classList.remove('hidden');
                document.getElementById('my-orders-trigger').classList.remove('hidden'); // إظهار زر طلباتي
                renderWelcome();
                renderLocalOrders(); // تحميل الطلبات القديمة لو النزيل عمل ريفرش
            }
            renderFoodMenu();
        };

        function saveProfile() {
            const name = document.getElementById('guest-name').value.trim();
            const room = document.getElementById('guest-room').value.trim();
            const phone = document.getElementById('guest-phone').value.trim();
            if(!name || !room || !phone) { alert("برجاء ملء البيانات أولاً للدخول!"); return; }
            localStorage.setItem('guest_name', name);
            localStorage.setItem('guest_room', room);
            localStorage.setItem('guest_phone', phone);
            location.reload();
        }

        function renderWelcome() { document.getElementById('welcome-msg').innerText = "غرفة " + localStorage.getItem('guest_room') + " | " + localStorage.getItem('guest_name'); }
        
        function renderFoodMenu() {
            const container = document.getElementById('food-list');
            container.innerHTML = '';
            FOOD_MENU.forEach(item => {
                container.innerHTML += `
                    <div class="item-card">
                        <div><strong>${item.name}</strong><br><span style="color:#ffca28;">${item.price} EGP</span></div>
                        <div class="counter-box">
                            <button class="btn-count" onclick="updateCart('${item.name}', -1)">-</button>
                            <span class="item-qty" id="qty-${item.id}">0</span>
                            <button class="btn-count" onclick="updateCart('${item.name}', 1)">+</button>
                        </div>
                    </div>`;
            });
        }

        function updateCart(name, change) {
            if(!cart[name]) cart[name] = 0;
            cart[name] += change;
            if(cart[name] <= 0) delete cart[name];
            const prod = FOOD_MENU.find(f => f.name === name);
            const el = document.getElementById("qty-" + prod.id);
            if(el) el.innerText = cart[name] || 0;
            updateCartBar();
        }

        function updateCartBar() {
            let total = 0, has = false;
            for (const [n, q] of Object.entries(cart)) { total += FOOD_MENU.find(f=>f.name===n).price * q; has = true; }
            if(has && !document.getElementById('restaurant-view').classList.contains('hidden')) {
                document.getElementById('cart-floating-bar').classList.remove('hidden');
                document.getElementById('cart-total-price').innerText = total + " EGP";
            } else { document.getElementById('cart-floating-bar').classList.add('hidden'); }
        }

        function openSection(id) { document.getElementById('menu-home').classList.add('hidden'); document.getElementById(id).classList.remove('hidden'); updateCartBar(); }
        function goHome() { document.getElementById('restaurant-view').classList.add('hidden'); document.getElementById('maintenance-view').classList.add('hidden'); document.getElementById('cleaning-view').classList.add('hidden'); document.getElementById('cart-floating-bar').classList.add('hidden'); document.getElementById('menu-home').classList.remove('hidden'); }
        function toggleRatingMenu() { document.getElementById('rating-submenu').classList.toggle('hidden'); }
        function toggleDrawer(open) { if(open) document.getElementById('orders-drawer').classList.add('open'); else document.getElementById('orders-drawer').classList.remove('open'); }

        // 📝 إضافة الطلب الجديد وحفظه محلياً في القائمة لتتبع حالته
        function addNewRequest(type) {
            let details = "";
            let prefix = "";

            if (type === 'restaurant') {
                let items = []; for (const [n, q] of Object.entries(cart)) items.push(`${n} (${q})`);
                details = items.join('، '); prefix = "🍔 طلب مطعم: ";
            } else if (type === 'maintenance') {
                details = document.getElementById('maint-type').value; prefix = "🔧 صيانة: عطل ";
            } else if (type === 'cleaning') {
                details = "تنظيف وتعقيم الغرفة بالكامل"; prefix = "🧹 ";
            }

            const newOrder = {
                id: 'ord-' + Date.now(),
                text: prefix + details,
                status: 'waiting' // الحالة الإفتراضية: قيد الانتظار
            };

            // حفظ في الـ LocalStorage
            let localOrders = JSON.parse(localStorage.getItem('my_orders') || '[]');
            localOrders.push(newOrder);
            localStorage.setItem('my_orders', JSON.stringify(localOrders));

            renderLocalOrders(); // تحديث شاشة التتبع فوراً
            alert("🚀 تم إرسال طلبك بنجاح وجاري مراجعته من الإشراف!");
            
            if(type === 'restaurant') cart = {};
            goHome();
            toggleDrawer(true); // فتح شاشة المراقبة للنزيل تلقائياً عشان يشوف طلبه وهو بينزل!
        }

        // 🔄 عرض وتوزيع الطلبات بناءً على حالتها (قيد الانتظار، قيد التنفيذ، تم)
        function renderLocalOrders() {
            const waitingBox = document.getElementById('list-waiting');
            const progressBox = document.getElementById('list-progress');
            const doneBox = document.getElementById('list-done');

            waitingBox.innerHTML = ''; progressBox.innerHTML = ''; doneBox.innerHTML = '';

            let localOrders = JSON.parse(localStorage.getItem('my_orders') || '[]');

            let counts = { waiting: 0, progress: 0, done: 0 };

            localOrders.forEach(order => {
                const html = `<div class="drawer-order-item"><strong>${order.text}</strong></div>`;
                if(order.status === 'waiting') { waitingBox.innerHTML += html; counts.waiting++; }
                else if(order.status === 'progress') { progressBox.innerHTML += html; counts.progress++; }
                else if(order.status === 'done') { doneBox.innerHTML += html; counts.done++; }
            });

            if(counts.waiting === 0) waitingBox.innerHTML = '<p style="color:#64748b; font-size:12px; margin:5px 0;">لا توجد طلبات معلقة</p>';
            if(counts.progress === 0) progressBox.innerHTML = '<p style="color:#64748b; font-size:12px; margin:5px 0;">لا توجد طلبات قيد التنفيذ حالياً</p>';
            if(counts.done === 0) doneBox.innerHTML = '<p style="color:#64748b; font-size:12px; margin:5px 0;">لم يتم إنهاء أي طلب بعد</p>';
        }

        function sendComplaint() { window.location.href = "https://wa.me/+2001016944198?text=" + encodeURIComponent("شكوى من غرفة " + localStorage.getItem('guest_room')); }
    </script>
</body>
</html>
