<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات فندق بيتزا سلايس</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #c5a059; padding-bottom: 15px; margin-bottom: 20px; }
        .user-name { font-size: 1.2rem; color: #c5a059; font-weight: bold; }
        
        /* تصميم المستطيلات العريضة */
        .section-container { margin-bottom: 15px; }
        .section-header { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 12px; border: 1px solid #c5a059; cursor: pointer; text-align: center; font-size: 1.1rem; }
        .section-content { display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 0 0 12px 12px; margin-top: -5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-name">أهلاً، <span id="user-display"></span> | غرفة <span id="room-display"></span></div>
        <button onclick="alert('طلباتي: قيد الانتظار...')" style="background:#c5a059; border:none; padding:10px; border-radius:5px;">طلباتي</button>
    </div>

    <div class="section-container">
        <div class="section-header" onclick="toggleSection('rest-content')">🍕 قسم المطعم (30+ صنف)</div>
        <div id="rest-content" class="section-content">
            <p>قائمة الطعام المتاحة...</p>
            </div>
    </div>

    <div class="section-container">
        <div class="section-header" onclick="toggleSection('clean-content')">🧹 قسم التنظيف</div>
        <div id="clean-content" class="section-content">
            <button onclick="alert('تم طلب خدمة التنظيف')">طلب تنظيف الغرفة</button>
        </div>
    </div>

    <script>
        // إظهار بيانات العميل
        document.getElementById('user-display').innerText = localStorage.getItem('name') || "نزيل";
        document.getElementById('room-display').innerText = localStorage.getItem('room') || "غير محدد";

        function toggleSection(id) {
            const content = document.getElementById(id);
            content.style.display = (content.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
