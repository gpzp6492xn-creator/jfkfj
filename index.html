<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل الفضائية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { background: #070714; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .card { width: 90%; background: rgba(255,255,255,0.05); border: 2px solid #c5a059; 
                border-radius: 20px; padding: 30px; margin: 15px auto; font-size: 1.8rem; 
                text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #c5a059; color: black; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="card" onclick="openRating()">⭐ التقييم</div>
    </div>

    <div id="restaurant" class="page">
        <div class="card" onclick="send('restaurant-orders', 'بيتزا')">🍕 طلب بيتزا</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="card" onclick="send('maintenance-channel', 'كهرباء')">⚡ كهرباء</div>
        <div class="card" onclick="send('maintenance-channel', 'مياه')">🚰 مياه</div>
        <div class="card" onclick="send('maintenance-channel', 'غاز')">🔥 غاز</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="card" onclick="send('cleaning-channel', 'تنظيف')">🧹 طلب تنظيف الغرفة</div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');

        // تسجيل البيانات
        if (!localStorage.getItem('guest_data')) {
            let n = prompt("الاسم الثلاثي؟"), p = prompt("رقم التليفون؟"), r = prompt("رقم الغرفة؟");
            localStorage.setItem('guest_data', JSON.stringify({n, p, r}));
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function send(channelName, type) {
            let g = JSON.parse(localStorage.getItem('guest_data'));
            ably.channels.get(channelName).publish('request', { name: g.n, room: g.r, type: type });
            alert("تم إرسال طلب " + type + " بنجاح!");
        }

        function openRating() {
            let g = JSON.parse(localStorage.getItem('guest_data'));
            if(confirm("إيجابي؟")) window.location.href = "https://maps.google.com";
            else window.location.href = `https://wa.me/201274847794?text=أنا ${g.n} غرفة ${g.r}، عندي مشكلة.`;
        }
    </script>
</body>
</html>
