<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #7000ff; /* Neon Purple */
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .btn-neon {
            background: linear-gradient(90deg, #00d4ff, #7000ff);
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="login-section" class="glass-card">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="name" placeholder="الاسم الثلاثي">
        <input type="text" id="room" placeholder="رقم الغرفة">
        <input type="text" id="phone" placeholder="رقم الموبايل">
        <button class="btn-neon" onclick="saveData()">حفظ البيانات</button>
    </div>
</body>
</html>
