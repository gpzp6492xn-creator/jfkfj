<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل - فندق 7 نجوم</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #05070A; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; padding: 20px; }
        .btn-big { background: #1a1a2e; border: 2px solid var(--gold); padding: 30px; margin: 15px 0; border-radius: 15px; font-size: 1.5rem; text-align: center; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #333; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 20px; border: 1px solid #444; text-align: center; font-size: 1.3rem; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

    <div style="text-align:center; padding: 20px; border-bottom: 2px solid var(--gold);">
        <h1>أهلاً كريم - غرفة 15</h1>
        <div class="btn-big" onclick="show('orders')" style="background:var(--gold); color:black;">📦 طلباتي (الجدول اللحظي)</div>
    </div>

    <div id="main" class="page active">
        <div class="btn-big" onclick="show('restaurant')">🍔 المطعم</div>
        <div class="btn-big" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="btn-big" onclick="show('cleaning')">🧹 التنظيف</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-container"></div>
        <div class="btn-big" style="background:var(--gold); color:black;" onclick="submitOrder()">تأكيد الطلب | الإجمالي: <span id="total-price">0</span> ج</div>
        <button onclick="show('main')" style="width:100%; padding:20px;">🔙 عودة</button>
    </div>

    <div id="orders" class="page">
        <table>
            <thead><tr><th>الطلب</th><th>الحالة</th></tr></thead>
            <tbody id="order-table"></tbody>
        </table>
        <button onclick="show('main')" style="width:100%; padding:20px; margin-top:20px;">🔙 عودة للرئيسية</button>
    </div>

    <script>
        const ably = new Ably.Realtime('T96fVQ.sgIqhw:iEh8DOlHnT9xY-tTSLUGK5NTVPKpYeiqmq9vAY6NCS0');
        const channel = ably.channels.get('hotel-orders');

        const menu = [{n: "بيتزا", p: 120}, {n: "شاورما", p: 85}, {n: "مشويات", p: 350}];
        let cart = {};

        // بناء المنيو
        menu.forEach(item => {
            document.getElementById('menu-container').innerHTML += `<div class="item-row">${item.n} (${item.p}ج) 
                <div><button onclick="update('${item.n}', ${item.p}, 1)">+</button> <span id="q-${item.n}">0</span> <button onclick="update('${item.n}', ${item.p}, -1)">-</button></div></div>`;
        });

        function update(n, p, d) {
            cart[n] = Math.max(0, (cart[n] || 0) + d);
            document.getElementById('q-'+n).innerText = cart[n];
            let tot = 0; menu.forEach(i => tot += (cart[i.n] || 0) * i.p);
            document.getElementById('total-price').innerText = tot;
        }

        function submitOrder() {
            let orderText = Object.keys(cart).filter(k => cart[k] > 0).map(k => k + " x" + cart[k]).join(", ");
            channel.publish('new-order', {item: orderText, status: 'قيد الانتظار'});
            alert("تم إرسال الطلب!"); show('orders');
        }

        channel.subscribe('new-order', (msg) => {
            document.getElementById('order-table').innerHTML += `<tr><td>${msg.data.item}</td><td>${msg.data.status}</td></tr>`;
        });
        
        // تحديث الحالة لحظي
        channel.subscribe('update', (msg) => {
            let row = document.getElementById('row-' + msg.data.id);
            if(row) row.cells[1].innerText = msg.data.status;
        });

        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
