<script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
<script>
    const pusher = new Pusher('YOUR_KEY', { cluster: 'YOUR_CLUSTER' });
    const channel = pusher.subscribe('hotel-channel');

    function sendOrder(serviceName) {
        const orderData = { 
            name: localStorage.getItem('guest_name'), 
            room: localStorage.getItem('guest_room'), 
            service: serviceName, 
            status: 'قيد الانتظار' 
        };
        
        // إرسال للأدمن
        channel.trigger('client-new-order', orderData);
        
        // حفظ محلياً
        let myOrders = JSON.parse(localStorage.getItem('myOrders') || '[]');
        myOrders.push(orderData);
        localStorage.setItem('myOrders', JSON.stringify(myOrders));
        alert('تم إرسال الطلب!');
    }
</script>
