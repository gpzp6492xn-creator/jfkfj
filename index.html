<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل الفضائية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #070714; }
        body { background: radial-gradient(circle, #1b1b3a, var(--bg)); color: white; font-family: sans-serif; padding: 20px; margin: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(197, 160, 89, 0.1); border: 1px solid var(--gold); padding: 30px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div class="glass">
        <h2>أهلاً بك يا <span id="u-name"></span></h2>
        <p>غرفة: <span id="u-room"></span></p>
    </div>

    <div class="grid">
        <div class="card" onclick="window.location.href='restaurant.html'">🍔 المطعم</div>
        <div class="card" onclick="window.location.href='maintenance.html'">🛠️ الصيانة</div>
        <div class="card" onclick="window.location.href='cleaning.html'">🧹 التنظيف</div>
        <div class="card" onclick="openRating()">⭐ التقييم</div>
    </div>

    <script>
        // حفظ البيانات للأبد
        if (!localStorage.getItem('guest_data')) {
            let n = prompt("الاسم الثلاثي؟");
            let p = prompt("رقم التليفون؟");
            let r = prompt("رقم الغرفة؟");
            localStorage.setItem('guest_data', JSON.stringify({n, p, r}));
        }
        let guest = JSON.parse(localStorage.getItem('guest_data'));
        document.getElementById('u-name').innerText = guest.n;
        document.getElementById('u-room').innerText = guest.r;

        function openRating() {
            let choice = confirm("إيجابي؟ (موافق) - سلبي؟ (إلغاء)");
            if(choice) window.location.href = "https://maps.google.com";
            else window.location.href = `https://wa.me/201274847794?text=مرحباً، أنا النزيل ${guest.n} غرفة ${guest.r}، لدي مشكلة بخصوص مكان حضرتك.`;
        }
    </script>
</body>
</html>
