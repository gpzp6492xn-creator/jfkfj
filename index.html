<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فندق 7 نجوم | بوابة النزلاء</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap');
        :root { --gold: #D4AF37; --bg: #05070A; }
        
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #05070A 100%); 
            color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; 
            min-height: 100vh; overflow-x: hidden;
        }

        .header { text-align: center; padding: 40px; animation: glow 3s infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 5px #D4AF37; } to { text-shadow: 0 0 20px #D4AF37; } }

        .btn-main { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--gold); 
            padding: 30px; margin: 20px 0; border-radius: 20px; 
            text-align: center; font-size: 1.8rem; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.4s;
        }
        .btn-main:hover { transform: scale(1.03); background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        .page { display: none; opacity: 0; transition: opacity 0.5s; }
        .active { display: block; opacity: 1; }
        
        .menu-grid { display: grid; gap: 15px; }
        .item { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="user">أهلاً بك: كريم محمد السيد</h1>
        <h2 id="room">غرفة: 15</h2>
    </div>

    <div id="main" class="page active">
        <div class="btn-main" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="btn-main" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="btn-main" onclick="show('cleaning')">🧹 خدمة التنظيف</div>
        <div class="btn-main" style="border-color: #4CAF50" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="btn-main" style="border-color: #f44336" onclick="window.location.href='https://wa.me/201274847794'">⚠️ تقييم سلبي</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-content" class="menu-grid"></div>
        <div class="btn-main" style="background:var(--gold); color:black" onclick="alert('تم إرسال الطلب')">تأكيد الطلب الإجمالي: <span id="total">0</span></div>
        <div class="btn-main" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="maintenance" class="page">
        <div class="btn-main" onclick="alert('جاري إرسال طلب الصيانة...')">💡 كهرباء | ❄️ تكييف | 🚰 سباكة | 🔥 غاز</div>
        <div class="btn-main" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="cleaning" class="page">
        <div class="btn-main" onclick="alert('جاري طلب التنظيف...')">🧹 تنظيف عادي | 🚨 تنظيف مستعجل</div>
        <div class="btn-main" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        const menu = [
            {n: "ساندوتش شاورما دجاج", p: 75}, {n: "وجبة شاورما عربي", p: 130}, {n: "بيتزا مارجريتا", p: 120},
            {n: "كفتة مشوية", p: 180}, {n: "كباب ضاني", p: 250}, {n: "ريش ضاني", p: 280}
        ];
        
        // بناء المنيو ديناميكياً
        let container = document.getElementById('menu-content');
        menu.forEach(i => {
            container.innerHTML += `<div class="item">${i.n} (${i.p}ج) 
                <button onclick="update('${i.n}',${i.p},1)">+</button>
                <span id="q-${i.n}">0</span>
                <button onclick="update('${i.n}',${i.p},-1)">-</button></div>`;
        });

        function update(n, p, d) { /* كود التحديث */ }
        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
