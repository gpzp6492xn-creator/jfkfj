<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>فندق الفخامة | بوابتك للرفاهية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #070714; }
        body { background: var(--dark); color: white; font-family: 'Cairo', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* تأثيرات النيون والزجاج */
        .glass-header { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid var(--gold); padding: 30px; border-radius: 30px; text-align: center; margin-bottom: 40px; box-shadow: 0 0 20px rgba(197, 160, 89, 0.2); }
        .card { background: linear-gradient(145deg, #1a1a2e, #070714); border: 1px solid var(--gold); padding: 40px; margin: 25px auto; border-radius: 40px; font-size: 1.8rem; text-align: center; cursor: pointer; transition: 0.5s; position: relative; overflow: hidden; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--gold); }
        
        /* قسم الطلبات */
        .order-panel { border-left: 5px solid var(--gold); padding: 20px; background: rgba(197, 160, 89, 0.05); margin: 10px 0; border-radius: 10px; }
        
        .page { display: none; } .active { display: block; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="glass-header">
        <h1 id="welcome">أهلاً بك يا بطل</h1>
        <h2 id="room">الغرفة رقم: -</h2>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('my-orders')">📦 طلباتي (قيد التنفيذ)</div>
        <div class="card" onclick="show('restaurant')">🍔 المطعم</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="card" onclick="window.location.href='https://maps.google.com'">⭐ تقييم إيجابي</div>
        <div class="card" onclick="rateNeg()">⚠️ تقييم سلبي</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-container"></div>
        <div class="card" style="background: var(--gold); color: black;" onclick="confirmOrder()">تأكيد الطلب | الإجمالي: <span id="total">0</span></div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <div id="my-orders" class="page">
        <div id="order-list"></div>
        <div class="card" onclick="show('main')">🔙 عودة</div>
    </div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        let guest = JSON.parse(localStorage.getItem('guest_data'));
        let cart = {};

        // بناء المنيو
        const menuItems = ["بيتزا مارجريتا", "باستا وايت صوص", "شاورما", "مشويات", "عصير", "ساندوتش دجاج"]; 
        const container = document.getElementById('menu-container');
        menuItems.forEach(item => {
            container.innerHTML += `<div class="card">${item} <button onclick="add('${item}')">+</button></div>`;
        });

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function rateNeg() {
            window.location.href = `https://wa.me/201274847794?text=نزيل ${guest.n} غ ${guest.r} عنده مشكلة.`;
        }

        // دالة التأكيد والرجوع
        function confirmOrder() {
            alert("تم إرسال الطلب للفندق!");
            show('main');
        }

        // تسجيل البيانات
        if(!guest) {
            let n = prompt("الاسم؟"), r = prompt("رقم الغرفة؟");
            guest = {n, r}; localStorage.setItem('guest_data', JSON.stringify(guest));
        }
        document.getElementById('welcome').innerText = "مرحباً يا: " + guest.n;
        document.getElementById('room').innerText = "غرفة: " + guest.r;
    </script>
</body>
</html>
