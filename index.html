<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>مطعم الفندق</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
</head>
<body>
    <h1>منيو المطعم</h1>
    <button onclick="addToCart('بيتزا مارجريتا', 120)">+ بيتزا مارجريتا (120)</button>
    <button onclick="addToCart('باستا', 150)">+ باستا (150)</button>
    
    <hr>
    <button onclick="confirmOrder()" style="background:green; color:white; padding:20px;">تأكيد الطلب وإرساله للمطبخ</button>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('restaurant-orders');
        let cart = [];

        function addToCart(item, price) {
            cart.push({item, price});
            alert("تم إضافة " + item + " للسلة");
        }

        function confirmOrder() {
            let guest = JSON.parse(localStorage.getItem('guest_data'));
            let total = cart.reduce((sum, i) => sum + i.price, 0);

            channel.publish('new-order', {
                name: guest.name,
                room: guest.room,
                items: cart.map(i => i.item).join(', '),
                total: total,
                time: new Date().toLocaleTimeString()
            });
            alert("تم إرسال طلبك للمطبخ!");
            cart = []; // فضي السلة
        }
    </script>
</body>
</html>
