<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>بوابة النزيل الذكية</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --gold: #c5a059; --bg: #0b0e14; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .card { background: rgba(255,255,255,0.05); border: 2px solid #333; padding: 30px; margin: 15px 0; border-radius: 20px; text-align: center; font-size: 1.5rem; cursor: pointer; }
        .page { display: none; } .active { display: block; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; font-size: 1.3rem; }
        button { padding: 15px 25px; background: var(--gold); border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>مرحباً كريم - غرفة 15</div>
        <div onclick="show('orders')" style="background:var(--gold); padding:10px; border-radius:10px">📦 طلباتي</div>
    </div>

    <div id="main" class="page active">
        <div class="card" onclick="show('restaurant')">🍔 المطعم الفاخر</div>
        <div class="card" onclick="show('maintenance')">🛠️ الصيانة</div>
        <div class="card" onclick="show('cleaning')">🧹 التنظيف</div>
        <div class="card" onclick="window.location.href='https://maps.app.goo.gl/c6vcYv1mosc7Vkmr6?g_st=ipc'">⭐ تقييم إيجابي</div>
        <div class="card" onclick="window.location.href='https://wa.me/201274847794'">⚠️ تقييم سلبي</div>
    </div>

    <div id="restaurant" class="page">
        <div id="menu-list"></div>
        <div class="card" style="background:var(--gold); color:black" onclick="placeOrder()">تأكيد الطلب</div>
        <button onclick="show('main')">🔙 عودة</button>
    </div>

    <div id="orders" class="page">
        <h3>قيد الانتظار</h3><div id="status-pending"></div>
        <h3>قيد التنفيذ</h3><div id="status-processing"></div>
        <h3>تم التنفيذ</h3><div id="status-done"></div>
        <button onclick="show('main')">🔙 عودة</button>
    </div>

    <script>
        const ably = new Ably.Realtime('0xzGaw.lE_D6w:BWnvUIkCtSy0pxAJxzno5KXIXyrP2WhBdfzMJS08ne4');
        const channel = ably.channels.get('orders-room-15');

        // استقبال التحديثات من الأدمن لحظياً
        channel.subscribe('update', (msg) => {
            document.getElementById('status-' + msg.data.status).innerHTML += `<div class="card">${msg.data.item}</div>`;
        });

        function placeOrder() {
            channel.publish('new', { item: 'طلب طعام كامل', status: 'pending' });
            alert("تم إرسال طلبك!");
            show('main');
        }

        function show(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
